<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鑑定書</title>

  <style>
    body {
      margin: 0;
      background: #f7f1ea;
      color: #3b2f2a;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      line-height: 1.9;
    }

    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #fffaf5;
      padding: 28px 20px;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 23px;
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 0.08em;
    }

    h2 {
      font-size: 18px;
      margin-top: 36px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d8b98a;
      color: #5a3d2b;
    }

    p {
      font-size: 16px;
      margin-bottom: 18px;
    }

    .message {
      background: #f2e7d8;
      padding: 18px;
      border-radius: 14px;
      margin-top: 30px;
    }

    .footer {
      text-align: center;
      margin-top: 36px;
      font-size: 14px;
      color: #8a7669;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">

      <h1>テスト様 鑑定書</h1>

      <p>
        このたびは、鑑定をお申し込みいただきありがとうございます。
      </p>

      <p>
        いただいた内容をもとに、今の状況とこれからの流れを視てまいりました。
      </p>

      <h2>今の状況について</h2>

      <p>
        ここに鑑定文を入れます。これはテスト用の文章です。
      </p>

      <p>
        スマホで読みやすいように、文章は段落ごとに分けて表示します。
      </p>

      <h2>お相手様のお気持ち</h2>

      <p>
        ここにお相手様のお気持ちについての鑑定文を入れます。
      </p>

      <h2>これからの流れ</h2>

      <p>
        ここにこれからの流れについての鑑定文を入れます。
      </p>

      <div class="message">
        <p>
          今回の鑑定書は、今の状況を整理しながら、これからどのように向き合っていけばよいのかをお伝えする内容です。
        </p>
      </div>

      <div class="footer">
        椿
      </div>

    </div>
  </div>
</body>
</html>
